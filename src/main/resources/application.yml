server:
  port: 8080

spring:
  application:
    name: xhs-lite-backend
  datasource:
    url: jdbc:h2:mem:xhslite;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2-schema.sql
      data-locations: classpath:db/h2-data.sql
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  packages-to-scan: com.dane.xhslite.controller
  swagger-ui:
    path: /swagger-ui.html
